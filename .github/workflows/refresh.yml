name: Refresh dashboard data

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit data.json files back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Fetch data for all orgs
        env:
          # GH_ORGS is a repo Variable (Settings → Variables → Actions)
          # Set it to a comma-separated list, e.g.: acme,widgets,tools
          GH_ORGS:  ${{ vars.GH_ORGS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/fetch-data.js

      - name: Generate org pages from template
        env:
          GH_ORGS: ${{ vars.GH_ORGS }}
        run: node scripts/generate-pages.js

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data [skip ci]"
          git push
