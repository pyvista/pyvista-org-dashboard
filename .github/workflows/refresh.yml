name: Refresh dashboard data

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit data.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Fetch GitHub org data
        env:
          GH_ORG:   ${{ vars.GH_ORG }}    # set in repo Settings → Variables
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # set in repo Settings → Secrets
        run: node scripts/fetch-data.js

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data [skip ci]"
          git push
